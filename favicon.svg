<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- dark background -->
  <rect width="32" height="32" rx="8" fill="#0E0E0F"/>
  <!-- subtle border -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="7.5" stroke="#80FFF9" stroke-opacity="0.25"/>
  <!-- cyan dot top-right -->
  <circle cx="25" cy="7" r="2.5" fill="#80FFF9" opacity="0.9"/>
  <!-- "SB" text -->
  <text x="16" y="21" font-family="'DM Sans', -apple-system, sans-serif" font-size="13" font-weight="600"
        fill="#F0F0EF" text-anchor="middle" letter-spacing="-0.5">SB</text>
</svg>
